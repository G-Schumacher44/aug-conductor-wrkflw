name: Conductor Maintenance
# Scheduled health check — mirrors what Demo 3 runs manually via Codex app cron.
# Runs validate.py and reports conductor spine status.
# On main, project/ is not deployed so project checks are skipped (warn, not fail).
# On demo-2-start and demo-3-start, project/ is committed and all checks run.

on:
  schedule:
    - cron: '0 6 * * 1'  # Monday 6am UTC
  workflow_dispatch:      # allow manual trigger

jobs:
  health-check:
    name: Conductor spine validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run spine validator
        run: python3 scripts/validate.py
      - name: Check queue completeness (demo branches only)
        if: hashFiles('project/conductor/index.md') != ''
        run: |
          python3 - <<'EOF'
          import re, sys
          index = open('project/conductor/index.md').read()
          non_stable = re.findall(r'\|\s*(ACTIVE|QUEUED|IN-PROGRESS)\s*\|', index, re.IGNORECASE)
          if non_stable:
              print(f'WARN: non-stable slices found: {non_stable}')
          else:
              print('All slices STABLE')
          EOF
