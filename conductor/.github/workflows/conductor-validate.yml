name: Conductor Validate
# Runs the Conductor spine validator on every push and PR.
# Zero external dependencies — uses stdlib only.
on:
  push:
  pull_request:

jobs:
  validate:
    name: Conductor spine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 scripts/validate.py
